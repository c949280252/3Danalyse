        function getOdds() {
            const activeTab = document.querySelector('.tab-content.active').id;
            let typeFilter;
            if (activeTab === 'tab-group') typeFilter = ['g3', 'g6', 'baozi'];
            else if (activeTab === 'tab-fushi') typeFilter = ['fushi'];

            else if (activeTab === 'tab-he') typeFilter = ['he'];
            else typeFilter = null;
            const odds = {};
            methods.forEach(m => {
                if (typeFilter && !typeFilter.includes(m.type)) return;

                if (!isNaN(val) && val > 0) odds[m.code] = val;

        function calculate(multiples, odds, rebateRate) {
            const totalCost = methods.reduce((sum, m) => {
                const mult = multiples[m.code] || 0;
                const detail = methodDetails[m.code];
                return sum + detail.groups * detail.perGroup * mult;
            }, 0);
            const rebate = totalCost * rebateRate;
            const realCost = totalCost - rebate;
            let g3Win = 0, g6Win = 0, bWin = 0;
            methods.forEach(m => {
                if (odds[m.code] && multiples[m.code]) {
                    const mult = multiples[m.code];
                    const detail = methodDetails[m.code];
                    const win = detail.hitGroups * detail.perGroup * mult * odds[m.code];
                    if (m.type === 'g3') g3Win += win;
                    else if (m.type === 'g6') g6Win += win;
                    else if (m.type === 'baozi') bWin += win;
                }
            });
            return {
                totalCost, rebate, realCost, g3Win, g6Win, bWin,
                g3Profit: g3Win - realCost, g6Profit: g6Win - realCost, bProfit: bWin - realCost,
                minProfit: Math.min(g3Win - realCost, g6Win - realCost, bWin - realCost),
                isSureWin: g3Win >= realCost && g6Win >= realCost && bWin >= realCost
            };
        }

        function findBalancedPlan(odds, rebateRate) {
            const activeMethods = methods.filter(m => odds[m.code]);
            if (activeMethods.length < 2) return null;
            let lcmHit = 1;
            activeMethods.forEach(m => { lcmHit = lcm(lcmHit, methodDetails[m.code].hitGroups); });
            for (let effectiveMult = lcmHit; effectiveMult <= lcmHit * 100; effectiveMult += lcmHit) {
                let totalCost = 0;
                const costs = {}, timesMap = {};
                const wins = { g3: 0, g6: 0, baozi: 0 };
                const profits = { g3: 0, g6: 0, baozi: 0 };
                let hasG3 = false, hasG6 = false, hasBaozi = false;
                activeMethods.forEach(m => {
                    const detail = methodDetails[m.code];
                    const times = effectiveMult / detail.hitGroups;
                    timesMap[m.code] = times;
                    const cost = detail.groups * detail.perGroup * times;
                    costs[m.code] = cost;
                    totalCost += cost;
                    const win = detail.hitGroups * detail.perGroup * times * odds[m.code];
                    if (m.type === 'g3') { wins.g3 += win; hasG3 = true; }
                    else if (m.type === 'g6') { wins.g6 += win; hasG6 = true; }
                    else if (m.type === 'baozi') { wins.baozi += win; hasBaozi = true; }
                });
                const rebate = totalCost * rebateRate;
                const realCost = totalCost - rebate;
                if (hasG3) profits.g3 = wins.g3 - realCost;
                if (hasG6) profits.g6 = wins.g6 - realCost;
                if (hasBaozi) profits.baozi = wins.baozi - realCost;
                if ((!hasG3 || profits.g3 > 0) && (!hasG6 || profits.g6 > 0) && (!hasBaozi || profits.baozi > 0)) {
                    return {
                        type: 'balanced', effectiveMult, timesMap, costs, wins, profits,
                        totalCost, rebate, realCost,
                        minProfit: Math.min(hasG3 ? profits.g3 : Infinity, hasG6 ? profits.g6 : Infinity, hasBaozi ? profits.baozi : Infinity),
                        roi: Math.min(hasG3 ? profits.g3 : Infinity, hasG6 ? profits.g6 : Infinity, hasBaozi ? profits.baozi : Infinity) / realCost * 100,
                        hasG3, hasG6, hasBaozi, activeMethods
                    };
                }
            }
            return null;
        }

        function findOptimalPlan(odds, rebateRate) {
            const activeMethods = methods.filter(m => odds[m.code]);
            if (activeMethods.length < 2) return null;
            const effectiveMults = activeMethods.map(m => methodDetails[m.code].hitGroups);
            let lcmEM = 1;
            effectiveMults.forEach(em => { lcmEM = lcm(lcmEM, em); });
            let bestResult = null;
            for (let k = 1; k <= 200; k++) {
                const effectiveMult = lcmEM * k;
                const multiples = {};
                activeMethods.forEach(m => { multiples[m.code] = effectiveMult / methodDetails[m.code].hitGroups; });
                const r = calculate(multiples, odds, rebateRate);
                if (r.isSureWin) {
                    r.multiples = multiples; r.roi = r.minProfit / r.realCost * 100;
                    r.effectiveMult = effectiveMult; r.lcmEM = lcmEM; r.k = k;
                    if (!bestResult || r.totalCost < bestResult.totalCost) bestResult = r;
                    if (k > 10 && bestResult && r.totalCost > bestResult.totalCost * 1.5) break;
                }
            }
            return bestResult;
        }

        function findSureWin(odds, rebateRate) {
            const results = [];
            const active = methods.filter(m => odds[m.code]);
            if (active.length < 2) return results;
            const codes = active.map(m => m.code);
            const maxM = 50;
            function* gen(cur, idx) {
                if (idx === codes.length) { yield { ...cur }; return; }
                for (let i = 1; i <= maxM; i++) { cur[codes[idx]] = i; yield* gen(cur, idx + 1); }
            }
            for (const multiples of gen({}, 0)) {
                const r = calculate(multiples, odds, rebateRate);
                if (r.isSureWin) { r.multiples = multiples; r.roi = r.minProfit / r.realCost * 100; results.push(r); }
            }
            results.sort((a, b) => b.minProfit - a.minProfit);
            return results.slice(0, 10);
        }

                    const expWin = prob * wins[m.code];
                    expectedWin += expWin;
                    details += '<div style="background:#f8f9fa;padding:6px;margin:4px 0;font-size:12px;"><strong>' + m.name + ':</strong> 拿回' + wins[m.code].toFixed(2) + ' - 成本' + realCost.toFixed(2) + ' = <span style="color:' + (profits[m.code] >= 0 ? '#27ae60' : '#e74c3c') + '">' + (profits[m.code] >= 0 ? '+' : '') + profits[m.code].toFixed(2) + '</span>元</div>';
                    probDetails += '<div style="background:#f8f9fa;padding:6px;margin:4px 0;font-size:12px;"><strong>' + m.name + ':</strong> 概率' + (prob*100).toFixed(1) + '% | 拿回' + wins[m.code].toFixed(2) + ' | 期望贡献' + expWin.toFixed(2) + ' | 盈亏<span style="color:' + (profits[m.code] >= 0 ? '#27ae60' : '#e74c3c') + '">' + (profits[m.code] >= 0 ? '+' : '') + profits[m.code].toFixed(2) + '</span></div>';
                });
                const expectedProfit = expectedWin - realCost;
                container.innerHTML = '<div class="result-box"><h3>❌ 无必赢组合</h3><p>当前赔率下无必赢方案</p><hr style="margin:10px 0;border:none;border-top:1px solid #eee;"><div><strong>总成本:</strong> ' + totalCost.toFixed(2) + ' 元 | <strong>返水:</strong> ' + rebate.toFixed(2) + ' 元 | <strong>实际成本:</strong> ' + realCost.toFixed(2) + ' 元</div><hr style="margin:10px 0;border:none;border-top:1px solid #eee;">' + details + '</div><div class="result-box"><h3>📈 概率期望分析</h3><div style="background:#e8f4fc;padding:10px;border-radius:4px;margin-bottom:10px;"><strong>期望收益:</strong> <span style="color:' + (expectedProfit >= 0 ? '#27ae60' : '#e74c3c') + ';font-size:16px;font-weight:bold;">' + (expectedProfit >= 0 ? '+' : '') + expectedProfit.toFixed(2) + ' 元</span> | 期望收益率: ' + (expectedProfit / realCost * 100).toFixed(2) + '%</div><div style="font-size:11px;color:#888;margin-bottom:10px;">期望收益 = Σ(各选项概率 × 拿回) - 实际成本<br>长期平均结果，有波动风险</div>' + probDetails + '</div>';
                return;
            }
            let costDetails = '', winDetails = '';
            activeMethods.forEach(m => {
                costDetails += '<div class="cost-item"><strong>' + m.name + '</strong>: ' + methodDetails[m.code].perGroup + '注x' + timesMap[m.code] + '倍</div>';
                winDetails += '<div style="background:#f8f9fa;padding:8px;border-radius:4px;margin:6px 0;font-size:12px;"><strong>' + m.name + ':</strong> 拿回' + wins[m.code].toFixed(2) + ' - 成本' + realCost.toFixed(2) + ' = +' + profits[m.code].toFixed(2) + '元</div>';
            });
            let expectedWin = 0, probDetails = '';
            activeMethods.forEach(m => {
                const prob = 2 * methodDetails[m.code].perGroup / 1000;
                expectedWin += prob * wins[m.code];
                probDetails += '<div style="background:#f8f9fa;padding:6px;margin:4px 0;font-size:12px;"><strong>' + m.name + ':</strong> 概率' + (prob*100).toFixed(1) + '% | 拿回' + wins[m.code].toFixed(2) + ' | 期望贡献' + (prob * wins[m.code]).toFixed(2) + ' | 盈亏<span style="color:' + (profits[m.code] >= 0 ? '#27ae60' : '#e74c3c') + '">' + (profits[m.code] >= 0 ? '+' : '') + profits[m.code].toFixed(2) + '</span></div>';
            });
            container.innerHTML = '<div class="summary" style="background:linear-gradient(135deg,#3498db,#2980b9);"><h2>⚖️ 和值均衡方案</h2><div class="big">+' + minProfit.toFixed(2) + ' 元</div><div>最低收益 | 收益率: ' + (minProfit / realCost * 100).toFixed(2) + '%</div></div><div class="result-box"><h3>📊 和值方案详情</h3><div style="background:#e8f4fc;padding:10px;border-radius:4px;margin-bottom:15px;"><strong>方案规律:</strong> 每个和值倍数 = 覆盖直码数</div>' + costDetails + '<hr style="margin:15px 0;border:none;border-top:1px solid #eee;"><div><strong>总成本:</strong> ' + totalCost.toFixed(2) + ' 元 | <strong>返水:</strong> ' + rebate.toFixed(2) + ' 元 | <strong>实际成本:</strong> ' + realCost.toFixed(2) + ' 元</div><hr style="margin:15px 0;border:none;border-top:1px solid #eee;">' + winDetails + '</div><div class="result-box"><h3>📈 概率期望分析</h3><div style="background:#e8f4fc;padding:10px;border-radius:4px;margin-bottom:10px;"><strong>期望收益:</strong> <span style="color:' + ((expectedWin - realCost) >= 0 ? '#27ae60' : '#e74c3c') + ';font-size:16px;font-weight:bold;">' + ((expectedWin - realCost) >= 0 ? '+' : '') + (expectedWin - realCost).toFixed(2) + ' 元</span> | 期望收益率: ' + ((expectedWin - realCost) / realCost * 100).toFixed(2) + '%</div><div style="font-size:11px;color:#888;margin-bottom:10px;">期望收益 = Σ(各选项概率 × 拿回) - 实际成本<br>长期平均结果，有波动风险</div>' + probDetails + '</div>';
        }

        function reset() {
            const activeTab = document.querySelector('.tab-content.active').id;
            let typeFilter;
            if (activeTab === 'tab-group') typeFilter = ['g3', 'g6', 'baozi'];
            else if (activeTab === 'tab-fushi') typeFilter = ['fushi'];
            else if (activeTab === 'tab-span') typeFilter = ['span'];
            else if (activeTab === 'tab-he') typeFilter = ['he'];
            methods.forEach(m => {
                if (typeFilter && !typeFilter.includes(m.type)) return;
                document.getElementById(m.code).value = '';
            });
            document.getElementById('rebate').value = '9.7';
            const results = document.getElementById('results');
            if (activeTab === 'tab-group') {
                results.innerHTML = '<div class="empty"><p>👈 每类只能填一项，三类都要填</p><p style="margin-top:10px;font-size:12px;">组三、组六只能各选一项，豹子必填</p></div>';
            } else if (activeTab === 'tab-fushi') {
                results.innerHTML = '<div class="empty"><p>👈 请填入复式玩法赔率</p><p style="margin-top:10px;font-size:12px;">与组选/跨度/和值互不相干</p></div>';
            } else {
                results.innerHTML = '<div class="empty"><p>👈 全填才能计算</p><p style="margin-top:10px;font-size:12px;">与组选互不相干</p></div>';
            }
        }
    </script>
</body>
</html>
