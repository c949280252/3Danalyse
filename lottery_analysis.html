        .left-panel .section h4 { font-size: 10px; color: #aaa; margin: 3px 0 2px 0; }

        .left-panel .item label { flex: 1; font-size: 11px; color: #555; white-space: nowrap; }
        .left-panel .item label .sub { color: #999; font-size: 10px; white-space: nowrap; }
        .left-panel .item input::-webkit-inner-spin-button,
        .left-panel .item input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .left-panel .item input[type=number] { -moz-appearance: textfield; }
        .left-panel .item input { width: 50px; padding: 3px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; }
        .left-panel .item input::placeholder { color: #ccc; }
        .left-panel .item input.active { background: #e8f8f0; border-color: #27ae60; }
        .left-panel .bottom-bar { background: #f8f9fa; padding: 8px 10px; border-top: 1px solid #ddd; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
        .left-panel .rebate-row { display: flex; align-items: center; gap: 6px; }
        .left-panel .rebate-row label { font-size: 11px; color: #555; }
        .left-panel .rebate-row input { width: 50px; padding: 3px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; }
        .left-panel .btn-row { display: flex; gap: 6px; flex: 1; }
        .left-panel .btn { flex: 1; padding: 8px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .left-panel .btn-primary { background: #27ae60; color: white; }
        .left-panel .btn-secondary { background: #95a5a6; color: white; }
        .right-panel { flex: 1; padding: 10px; overflow-y: auto; }
        .result-box { background: white; border-radius: 6px; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .result-box h3 { color: #2c3e50; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #27ae60; font-size: 14px; }
        .strategy { background: #f8f9fa; border-radius: 6px; padding: 10px; margin-bottom: 10px; border-left: 3px solid #27ae60; }
        .strategy h4 { color: #2c3e50; margin-bottom: 6px; font-size: 13px; }
        .strategy .detail { font-size: 12px; color: #555; line-height: 1.6; }
        .strategy .profit { font-size: 14px; font-weight: bold; color: #27ae60; margin-top: 6px; }
        .summary { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 15px; }
        .summary h2 { margin-bottom: 5px; font-size: 14px; }
        .summary .big { font-size: 28px; font-weight: bold; }
        .empty { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; }
        .formula { background: #f0f0f0; padding: 8px; border-radius: 4px; font-size: 11px; line-height: 1.6; flex-shrink: 0; }
        .cost-item { background: #e8f8f0; padding: 6px 10px; border-radius: 3px; margin: 4px 0; font-size: 12px; }
        .btn-analyze { background: #27ae60 !important; font-size: 14px; }
        .tab-bar { display: flex; background: #2c3e50; }
        .tab-btn { flex: 1; padding: 6px; border: none; background: transparent; color: #aaa; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: white; border-bottom-color: #27ae60; }
        .tab-content { display: none; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; }
        .manual-wrapper { padding: 10px; flex: 1; overflow-y: auto; }
        .manual-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
        .manual-table th, .manual-table td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        .manual-table th { background: #f8f9fa; color: #555; }
        .manual-table select, .manual-table input { padding: 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; }
        .manual-table select { min-width: 80px; }
        .manual-btn-add { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .manual-btn-remove { background: #e74c3c; color: white; border: none; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-size: 11px; }
    </style>
</head>

        function calculate(multiples, odds, rebateRate) {
            const totalCost = methods.reduce((sum, m) => {
                const mult = multiples[m.code] || 0;
                const detail = methodDetails[m.code];
                return sum + detail.groups * detail.perGroup * mult;
            }, 0);
            const rebate = totalCost * rebateRate;
            const realCost = totalCost - rebate;
            let g3Win = 0, g6Win = 0, bWin = 0;
            methods.forEach(m => {
                if (odds[m.code] && multiples[m.code]) {
                    const mult = multiples[m.code];
                    const detail = methodDetails[m.code];
                    const win = detail.hitGroups * detail.perGroup * mult * odds[m.code];
                    if (m.type === 'g3') g3Win += win;
                    else if (m.type === 'g6') g6Win += win;
                    else if (m.type === 'baozi') bWin += win;
                }
            });
            return {
                totalCost, rebate, realCost, g3Win, g6Win, bWin,
                g3Profit: g3Win - realCost, g6Profit: g6Win - realCost, bProfit: bWin - realCost,
                minProfit: Math.min(g3Win - realCost, g6Win - realCost, bWin - realCost),
                isSureWin: g3Win >= realCost && g6Win >= realCost && bWin >= realCost
            };
        }

        function findBalancedPlan(odds, rebateRate) {
            const activeMethods = methods.filter(m => odds[m.code]);
            if (activeMethods.length < 2) return null;
            let lcmHit = 1;
            activeMethods.forEach(m => { lcmHit = lcm(lcmHit, methodDetails[m.code].hitGroups); });
            for (let effectiveMult = lcmHit; effectiveMult <= lcmHit * 100; effectiveMult += lcmHit) {
                let totalCost = 0;
                const costs = {}, timesMap = {};
                const wins = { g3: 0, g6: 0, baozi: 0 };
                const profits = { g3: 0, g6: 0, baozi: 0 };
                let hasG3 = false, hasG6 = false, hasBaozi = false;
                activeMethods.forEach(m => {
                    const detail = methodDetails[m.code];
                    const times = effectiveMult / detail.hitGroups;
                    timesMap[m.code] = times;
                    const cost = detail.groups * detail.perGroup * times;
                    costs[m.code] = cost;
                    totalCost += cost;
                    const win = detail.hitGroups * detail.perGroup * times * odds[m.code];
                    if (m.type === 'g3') { wins.g3 += win; hasG3 = true; }
                    else if (m.type === 'g6') { wins.g6 += win; hasG6 = true; }
                    else if (m.type === 'baozi') { wins.baozi += win; hasBaozi = true; }
                });
                const rebate = totalCost * rebateRate;
                const realCost = totalCost - rebate;
                if (hasG3) profits.g3 = wins.g3 - realCost;
                if (hasG6) profits.g6 = wins.g6 - realCost;
                if (hasBaozi) profits.baozi = wins.baozi - realCost;
                if ((!hasG3 || profits.g3 > 0) && (!hasG6 || profits.g6 > 0) && (!hasBaozi || profits.baozi > 0)) {
                    return {
                        type: 'balanced', effectiveMult, timesMap, costs, wins, profits,
                        totalCost, rebate, realCost,
                        minProfit: Math.min(hasG3 ? profits.g3 : Infinity, hasG6 ? profits.g6 : Infinity, hasBaozi ? profits.baozi : Infinity),
                        roi: Math.min(hasG3 ? profits.g3 : Infinity, hasG6 ? profits.g6 : Infinity, hasBaozi ? profits.baozi : Infinity) / realCost * 100,
                        hasG3, hasG6, hasBaozi, activeMethods
                    };
                }
            }
            return null;
        }

        function findOptimalPlan(odds, rebateRate) {
            const activeMethods = methods.filter(m => odds[m.code]);
            if (activeMethods.length < 2) return null;
            const effectiveMults = activeMethods.map(m => methodDetails[m.code].hitGroups);
            let lcmEM = 1;
            effectiveMults.forEach(em => { lcmEM = lcm(lcmEM, em); });
            let bestResult = null;
            for (let k = 1; k <= 200; k++) {
                const effectiveMult = lcmEM * k;
                const multiples = {};
                activeMethods.forEach(m => { multiples[m.code] = effectiveMult / methodDetails[m.code].hitGroups; });
                const r = calculate(multiples, odds, rebateRate);
                if (r.isSureWin) {
                    r.multiples = multiples; r.roi = r.minProfit / r.realCost * 100;
                    r.effectiveMult = effectiveMult; r.lcmEM = lcmEM; r.k = k;
                    if (!bestResult || r.totalCost < bestResult.totalCost) bestResult = r;
                    if (k > 10 && bestResult && r.totalCost > bestResult.totalCost * 1.5) break;
                }
            }
            return bestResult;
        }

        function findSureWin(odds, rebateRate) {
            const results = [];
            const active = methods.filter(m => odds[m.code]);
            if (active.length < 2) return results;
            const codes = active.map(m => m.code);
            const maxM = 50;
            function* gen(cur, idx) {
                if (idx === codes.length) { yield { ...cur }; return; }
                for (let i = 1; i <= maxM; i++) { cur[codes[idx]] = i; yield* gen(cur, idx + 1); }
            }
            for (const multiples of gen({}, 0)) {
                const r = calculate(multiples, odds, rebateRate);
                if (r.isSureWin) { r.multiples = multiples; r.roi = r.minProfit / r.realCost * 100; results.push(r); }
            }
            results.sort((a, b) => b.minProfit - a.minProfit);
            return results.slice(0, 10);
        }

        function getManualCover(code, numbers) {
            var cover = [];
            var type = '';
            // 沾边赖必须优先检查（因为 zg3 包含 g3，zg6 包含 g6）
            if (code.indexOf('zg3') >= 0) type = 'zg3';
            else if (code.indexOf('zg6') >= 0) type = 'zg6';
            else if (code.indexOf('g3') >= 0) type = 'g3';
            else if (code.indexOf('g6') >= 0) type = 'g6';
            else if (code.indexOf('baozi') >= 0) type = 'baozi';
            else if (code.indexOf('span_') >= 0) type = 'span';
            else if (code.indexOf('fushi_') >= 0) type = 'fushi';
            else if (code.indexOf('he_') >= 0) type = 'he';
            
            if ((type === 'g3' || type === 'g6' || type === 'zg3' || type === 'zg6') && code.indexOf('_all') < 0) {
                if (!numbers) return [];
                var digits = numbers.replace(/[,，\s]+/g, '').split('');
                var numDigits = digits.length;
                
                // 解析需要几位：从code中提取，如g3_2表示需要2个数字
                var needDigits = 0;
                if (code.indexOf('zg3_') >= 0) needDigits = parseInt(code.replace('zg3_', ''));
                else if (code.indexOf('zg6_') >= 0) needDigits = parseInt(code.replace('zg6_', ''));
                else if (code.indexOf('g3_') >= 0) needDigits = parseInt(code.replace('g3_', ''));
                else if (code.indexOf('g6_') >= 0) needDigits = parseInt(code.replace('g6_', ''));
                else if (code.indexOf('fushi_') >= 0) needDigits = parseInt(code.replace('fushi_', ''));
                
                if (type === 'g3') {
                    // 组三N码：用户选N个数字，选其中2个作为对子，生成2个一样的+1个不同的排列
                    // 如选12：生成112,121,211,122,212,221（6个直码，每个对子6注）
                    if (numDigits >= 2 && needDigits >= 2) {
                        for (var a = 0; a < numDigits; a++) {
                            for (var b = a + 1; b < numDigits; b++) {
                                var d1 = digits[a], d2 = digits[b];
                                // 两个相等的+第三个是另一个：112,121,211（两个1一个2的各种排列）
                                cover.push(d1 + d1 + d2, d1 + d2 + d1, d2 + d1 + d1);
                                // 另一个+两个相等的：122,212,221
                                cover.push(d1 + d2 + d2, d2 + d1 + d2, d2 + d2 + d1);
                            }
                        }
                    } else if (numDigits >= 3) {
                        // 原逻辑：3个以上数字随便选3个排列
                        for (var a = 0; a < digits.length; a++) {
                            for (var b = 0; b < digits.length; b++) {
                                if (b === a) continue;
                                for (var c = 0; c < digits.length; c++) {
                                    if (c === a || c === b) continue;
                                    var d1 = digits[a], d2 = digits[b], d3 = digits[c];
                                    cover.push(d1 + d2 + d3, d1 + d3 + d2, d2 + d1 + d3, d2 + d3 + d1, d3 + d1 + d2, d3 + d2 + d1);
                                }
                            }
                        }
                    }
                } else if (type === 'g6') {
                    for (var a = 0; a < digits.length; a++) {
                        for (var b = a + 1; b < digits.length; b++) {
                            for (var c = b + 1; c < digits.length; c++) {
                                var d1 = digits[a], d2 = digits[b], d3 = digits[c];
                                cover.push(d1+d2+d3, d1+d3+d2, d2+d1+d3, d2+d3+d1, d3+d1+d2, d3+d2+d1);
                            }
                        }
                    }
                } else if (type === 'zg3') {
                    // 沾边赖组三：只需包含指定数字任意一位，且是组三（有对子）
                    for (var di = 0; di < digits.length; di++) {
                        var d = digits[di];
                        for (var i = 0; i <= 9; i++) {
                            for (var j = 0; j <= 9; j++) {
                                for (var k = 0; k <= 9; k++) {
                                    var s = '' + i + j + k;
                                    // 组三：必须包含指定数字d，且有两个数字相等
                                    if (s.indexOf(d) >= 0 && ((i===j && j!==k) || (i===k && k!==j) || (j===k && k!==i))) cover.push(s);
                                }
                            }
                        }
                    }
                } else if (type === 'zg6') {
                    // 沾边赖组六：只需包含指定数字任意一位，且是组六（无对子）
                    for (var di = 0; di < digits.length; di++) {
                        var d = digits[di];
                        for (var i = 0; i <= 9; i++) {
                            for (var j = 0; j <= 9; j++) {
                                for (var k = 0; k <= 9; k++) {
                                    var s = '' + i + j + k;
                                    // 组六：必须包含指定数字d，且三个数字都不相等
                                    if (s.indexOf(d) >= 0 && i !== j && j !== k && i !== k) cover.push(s);
                                }
                            }
                        }
                    }
                }
            } else if (code.indexOf('_all') >= 0) {
                if (code.indexOf('g3_all') >= 0) {
                    for (var i = 0; i <= 9; i++) {
                        for (var j = 0; j <= 9; j++) {
                            for (var k = 0; k <= 9; k++) {
                                if ((i===j && j!==k) || (i===k && k!==j) || (j===k && k!==i)) cover.push(''+i+j+k);
                            }
                        }
                    }
                } else if (code.indexOf('g6_all') >= 0) {
                    for (var i = 0; i <= 9; i++) {
                        for (var j = 0; j <= 9; j++) {
                            for (var k = 0; k <= 9; k++) {
                                if (i !== j && j !== k && i !== k) cover.push(''+i+j+k);
                            }
                        }
                    }
                }
            } else if (type === 'span') {
                var span = parseInt(code.replace('span_', ''));
                for (var i = 0; i <= 9; i++) {
                    for (var j = 0; j <= 9; j++) {
                        for (var k = 0; k <= 9; k++) {
                            if (Math.max(i,j,k) - Math.min(i,j,k) === span) cover.push(''+i+j+k);
                        }
                    }
                }
            } else if (type === 'he') {
                var he = parseInt(code.replace('he_', ''));
                for (var i = 0; i <= 9; i++) {
                    for (var j = 0; j <= 9; j++) {
                        for (var k = 0; k <= 9; k++) {
                            if (i+j+k === he) cover.push(''+i+j+k);
                        }
                    }
                }
            } else if (type === 'baozi') {
                for (var d = 0; d <= 9; d++) cover.push(''+d+d+d);
            } else if (type === 'fushi') {
                if (!numbers) return [];
                var digits = numbers.replace(/[,，\s]+/g, '').split('');
                for (var a = 0; a < digits.length; a++) {
                    for (var b = 0; b < digits.length; b++) {
                        for (var c = 0; c < digits.length; c++) {
                            cover.push(digits[a]+digits[b]+digits[c]);
                        }
                    }
                }
            }
            return [...new Set(cover)];
        }

                var amount = parseFloat(inputs[3].value);
                
                if (code && !isNaN(odds) && odds > 0 && !isNaN(amount) && amount > 0) {
                    var cover = getManualCover(code, numbers);
                    bets.push({code: code, label: label, numbers: numbers, odds: odds, amount: amount, cover: cover});
                }
            }
            
            if (bets.length === 0) { alert('请至少填写一组玩法、赔率和金额'); return; }
            
            // 枚举1000直码
            var caseGroups = {};
            var betCoverMap = [];
            for (var i = 0; i < bets.length; i++) {
                var bet = bets[i];
                var coverSet = new Set(bet.cover);
                betCoverMap.push({label: bet.label, cover: coverSet, amount: bet.amount, odds: bet.odds});
            }
            
            for (var a = 0; a <= 9; a++) {
                for (var b = 0; b <= 9; b++) {
                    for (var c = 0; c <= 9; c++) {
                        var code = '' + a + b + c;
                        var matched = [];
                        for (var i = 0; i < betCoverMap.length; i++) {
                            if (betCoverMap[i].cover.has(code)) {
                                matched.push(betCoverMap[i].label);
                            }
                        }
                        // 生成状态key: 不中/只中A/只中B/AB都中
                        var key;
                        if (matched.length === 0) {
                            key = '不中';
                        } else if (matched.length === 1) {
                            key = '只中' + matched[0];
                        } else {
                            matched.sort();
                            key = matched.join('+') + '都中';
                        }
                        if (!caseGroups[key]) caseGroups[key] = [];
                        caseGroups[key].push(code);
                    }
                }
            }
            
            var container = document.getElementById('results');
            var totalCost = 0;
            for (var i = 0; i < bets.length; i++) { totalCost += bets[i].amount; }
            var rebate = totalCost * rebateRate;
            var caseStats = [];
            
            for (var key in caseGroups) {
                var prob = caseGroups[key].length / 1000;
                var totalPayout = 0;
                for (var i = 0; i < betCoverMap.length; i++) {
                    var bc = betCoverMap[i];
                    var isHit = false;
                    if (key === '不中') {
                        isHit = false;
                    } else {
                        // 解析状态key判断是否命中
                        var hitLabels = key.replace('都中', '').replace('只中', '').split('+').filter(function(x) { return x; });
                        isHit = hitLabels.indexOf(bc.label) >= 0;
                    }
                    if (isHit) { totalPayout += bc.amount * bc.odds; }
                }
                var profit = totalCost - rebate - totalPayout;
                caseStats.push({name: key, profit: profit, prob: prob});
            }
            
            var totalCoverSet = new Set();
            for (var i = 0; i < bets.length; i++) {
                bets[i].cover.forEach(function(c) { totalCoverSet.add(c); });
            }
            var totalCover = totalCoverSet.size;
            
            var houseProfit = 0;
            for (var i = 0; i < caseStats.length; i++) {
                houseProfit += caseStats[i].profit * caseStats[i].prob;
            }
            var houseRoi = totalCost > 0 ? (houseProfit / totalCost) * 100 : 0;
            
            var isSureWin = totalCover >= 1000;
            for (var i = 0; i < caseStats.length; i++) {
                if (caseStats[i].profit <= 0) { isSureWin = false; break; }
            }
            
            var betDetails = '';
            for (var i = 0; i < bets.length; i++) {
                betDetails += '<div class="cost-item"><strong>' + bets[i].label + '</strong>(' + bets[i].code + '): ' + bets[i].amount + '元 × ' + bets[i].odds + '赔率，覆盖<strong>' + bets[i].cover.length + '</strong>个直码</div>';
            }
            
            var caseDetails = '';
            for (var i = 0; i < caseStats.length; i++) {
                var c = caseStats[i];
                var color = c.profit > 0 ? '#e74c3c' : '#27ae60';
                var sign = c.profit > 0 ? '+' : '';
                caseDetails += '<div style="background:#f8f9fa;padding:6px;margin:4px 0;font-size:12px;"><strong>' + c.name + '</strong>: 庄<span style="color:' + color + '">' + sign + c.profit.toFixed(2) + '</span>元 (' + (c.prob*100).toFixed(1) + '%)</div>';
            }
            
            if (isSureWin && totalCover >= 1000) {
                container.innerHTML = '<div class="summary" style="background:linear-gradient(135deg,#27ae60,#2ecc71);"><h2>✓ 必赢方案</h2><div class="big">覆盖' + totalCover + '/1000</div><div>庄家利润: ' + houseRoi.toFixed(2) + '%</div></div><div class="result-box"><h3>📊 下注详情</h3>' + betDetails + '<hr style="margin:10px 0;border:none;border-top:1px solid #eee;"><div><strong>总成本:</strong> ' + totalCost.toFixed(2) + ' 元 | <strong>返水:</strong> ' + rebate.toFixed(2) + ' 元</div></div><div class="result-box"><h3>📈 各情况盈亏</h3>' + caseDetails + '</div>';
            } else {
                container.innerHTML = '<div class="result-box"><h3>' + (isSureWin ? '✓ 必赢' : '❌ 非必赢') + '</h3><p>覆盖 ' + totalCover + '/1000 直码</p><hr style="margin:10px 0;border:none;border-top:1px solid #eee;">' + betDetails + '<hr style="margin:10px 0;border:none;border-top:1px solid #eee;"><div><strong>总成本:</strong> ' + totalCost.toFixed(2) + ' 元 | <strong>返水:</strong> ' + rebate.toFixed(2) + ' 元</div></div><div class="result-box"><h3>📈 各情况盈亏 (' + houseRoi.toFixed(2) + '% 庄家利润)</h3>' + caseDetails + '</div>';
            }
        }

        if (document.addEventListener) {
            document.addEventListener('DOMContentLoaded', initManual);
        }
    </script>
</body>
</html>
